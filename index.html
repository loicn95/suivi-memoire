const DOC_REF_MEMOIRE=`DOCUMENT DE RÉFÉRENCE — EXEMPLE DE MÉMOIRE DE FIN D'ÉTUDES (IFSI Beaujon, Promo 2019-2022)
Titre : "Les émotions des soignants face à la pratique professionnelle"
Auteure : ALVES RODRIGUES Ingrid | Directeur : JAIN Loïc

STRUCTURE GÉNÉRALE (à utiliser comme modèle) :
1. Introduction — Ancrage personnel dans la formation, justification du sujet, annonce du plan
2. Situation de départ (I) — Description clinique précise, analyse multi-angles (émotions, mécanismes de défense, relation soignant-soigné, communication, prendre soin), question de départ formulée clairement en majuscules
3. Exploration empirique (II) — Intérêt de l'enquête, outil (entretiens semi-directifs), population choisie (5 IDE de services variés), présentation en tableau, limites et difficultés honnêtement exposées
4. Cadre de référence (III) — 4 concepts développés : L'infirmier / Les émotions / La juste distance / La relation soignant-soigné. Chaque concept : histoire/définition, types, lien avec la pratique, références théoriques multiples citées avec notes de bas de page
5. Discussion et hypothèse de recherche (IV) — Confrontation théorie/terrain, réponse partielle à la question de départ, ouverture vers une nouvelle question de recherche
6. Conclusion — Retour sur l'apport personnel et professionnel du travail
7. Bibliographie — Classée par catégories (Ouvrages, Revues, Articles, Textes officiels, Sites web), norme ISO 690
8. Annexes — Guide d'entretien + 5 retranscriptions intégrales anonymisées

POINTS FORTS À RETENIR COMME MODÈLE :
- Situation de départ précise, concrète, vécue en stage (mort périnatale aux urgences gynéco)
- Analyse multidimensionnelle de la situation (émotions, mécanismes de défense, relation, communication)
- Question de départ claire, découlant directement de la situation
- Cadre de référence solide avec auteurs variés (Phaneuf, Hesbeen, Ekman, Lelord/André, Prayez, Mercadier...)
- Allers-retours constants entre théorie et données terrain (entretiens cités directement dans le texte)
- Hypothèse de recherche reformulée en fin de travail ouvrant vers la recherche ultérieure
- Bibliographie complète, normalisée ISO 690, catégorisée
- Abstract bilingue (français/anglais) avec mots-clés en 4e de couverture
- 81 pages au total dont 33 de corps + annexes

EXEMPLES DE BONNES PRATIQUES RÉDACTIONNELLES :
- Les citations d'auteurs sont intégrées dans le texte et renvoyées en note de bas de page numérotée
- Les entretiens sont présentés par un tableau (genre, prénom anonymisé, service, années d'expérience, motivation)
- La question de départ est formulée en majuscules et centrée sur une page
- Les concepts sont définis rigoureusement avant d'être mis en lien avec les données de terrain
- Les limites méthodologiques sont exposées franchement (difficultés d'accès aux professionnels, retards, synthèse des entretiens)`;
